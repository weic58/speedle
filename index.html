<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speedle - 極速拼字</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23538d4e'/><text x='50' y='72' font-size='70' fill='white' text-anchor='middle' font-family='Arial, sans-serif' font-weight='bold'>S</text></svg>">
    <style>
        /* --- 顏色與基礎變數 --- */
        :root {
            --bg-color: #121213; --text-color: #ffffff; --border-color: #3a3a3c;
            --filled-border: #565758; --wordle-green: #538d4e; --wordle-yellow: #b59f3b; --wordle-gray: #3a3a3c;
            --error-color: #e23636; --panel-bg: #272729; --overlay-bg: rgba(0, 0, 0, 0.9); 
            --def-color: #cccccc; --accent-color: #4a90e2; --hint-color: #e6c229;
        }

        [data-theme="light"] {
            --bg-color: #ffffff; --text-color: #121213; --border-color: #d3d6da;
            --filled-border: #878a8c; --wordle-green: #6aaa64; --wordle-yellow: #c9b458; --wordle-gray: #787c7e;
            --error-color: #e23636; --panel-bg: #f0f0f0; --overlay-bg: rgba(255, 255, 255, 0.95); 
            --def-color: #555555; --accent-color: #2b7cd3; --hint-color: #d4ac0d;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px; height: 100vh; box-sizing: border-box;
            transition: 0.3s; overflow: hidden; position: relative;
        }

        button { touch-action: manipulation; }

        header {
            width: 100%; max-width: 500px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px; margin-bottom: 20px; z-index: 5; flex-shrink: 0;
        }
        h1 { margin: 0; font-size: 2.2rem; letter-spacing: 2px; cursor: pointer; transition: 0.2s; }
        h1:hover { color: var(--wordle-green); }
        .header-controls { display: flex; gap: 8px; }
        .icon-btn { background: none; border: none; color: var(--text-color); font-size: 1.4rem; cursor: pointer; transition: 0.2s; padding: 5px; }
        .icon-btn:hover { transform: scale(1.15); }

        .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; z-index: 2; height: 100%; }
        .screen.active { display: flex; }

        /* --- 美化首頁 --- */
        #setup-screen { gap: 15px; margin-top: 10px; width: 100%; height: auto; }
        .loading-text { font-size: 1.2rem; color: var(--accent-color); font-weight: bold; margin-bottom: 10px; }
        .mode-cards { display: flex; flex-direction: column; gap: 15px; width: 100%; opacity: 0; pointer-events: none; transition: 0.5s; }
        .mode-cards.ready { opacity: 1; pointer-events: auto; }
        
        .mode-card {
            padding: 20px; border-radius: 16px; cursor: pointer; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.2s;
            color: white; border: none; width: 100%; box-sizing: border-box; position: relative;
        }
        .mode-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .mode-card h2 { margin: 0 0 5px 0; font-size: 1.8rem; letter-spacing: 1px; }
        .mode-card p { margin: 0 0 10px 0; font-size: 1rem; opacity: 0.9; }
        .high-score-badge { background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; }

        .card-level { background: linear-gradient(135deg, #f39c12, #d35400); }
        .card-endless { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .card-practice { background: linear-gradient(135deg, #2ecc71, #27ae60); }

        /* --- 設定齒輪 Modal --- */
        #settings-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--overlay-bg); display: flex; justify-content: center; align-items: center; z-index: 30; opacity: 0; pointer-events: none; transition: 0.3s; }
        #settings-modal.show { opacity: 1; pointer-events: auto; }
        .settings-box { background-color: var(--panel-bg); padding: 30px; border-radius: 12px; width: 80%; max-width: 350px; text-align: center; border: 1px solid var(--border-color); }
        
        .length-selector { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .len-btn, .kb-size-btn, .time-btn { 
            flex: 1 1 20%; background-color: var(--bg-color); color: var(--text-color); border: 2px solid var(--border-color);
            padding: 10px 0; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.2s;
            min-width: 65px;
        }
        .len-btn.active, .kb-size-btn.active, .time-btn.active { background-color: var(--accent-color); border-color: var(--accent-color); color: white; }
        
        /* 新增：圖形化固定格子選擇器 CSS */
        .pattern-selector { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .pattern-box {
            width: 45px; height: 45px; border: 2px solid var(--border-color);
            border-radius: 8px; cursor: pointer; background-color: var(--bg-color);
            transition: 0.2s;
        }
        .pattern-box.active {
            background-color: var(--wordle-green); border-color: var(--wordle-green);
        }

        .close-btn { background-color: var(--accent-color); color: white; border: none; padding: 10px 20px; font-size: 1.1rem; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }

        /* --- 遊戲儀表板 UI --- */
        #game-info { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; flex-shrink: 0; }
        .mode-badge { font-size: 1.1rem; color: var(--text-color); opacity: 0.8; }
        .stats-group { display: flex; gap: 10px; }
        .pill { padding: 8px 16px; border-radius: 25px; font-size: 1.2rem; display: flex; align-items: center; gap: 5px; }
        .time-pill { background-color: var(--error-color); color: white; box-shadow: 0 4px 10px rgba(226, 54, 54, 0.3); }
        .score-pill { background-color: var(--accent-color); color: white; box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3); }

        /* --- 遊戲區塊 --- */
        #board-container { position: relative; margin-bottom: 10px; flex-shrink: 0; }
        #board { display: flex; gap: 8px; position: relative; z-index: 2; transition: 0.3s; }
        .tile {
            width: 60px; height: 60px; border: 2px solid var(--border-color); display: flex; justify-content: center; align-items: center;
            font-size: 2rem; font-weight: bold; text-transform: uppercase; background-color: var(--bg-color);
            transition: transform 0.2s, background-color 0.2s, border-color 0.2s; color: var(--text-color);
        }
        .tile.filled { border-color: var(--filled-border); animation: pop 0.1s ease-in-out; }
        .tile.fixed { background-color: var(--wordle-green); border-color: var(--wordle-green); color: white; }
        .tile.hinted { color: var(--hint-color); opacity: 0.6; font-size: 1.8rem; }
        .tile.error { background-color: var(--error-color) !important; border-color: var(--error-color) !important; color: white; }
        .board-success .tile { background-color: var(--wordle-green); border-color: var(--wordle-green); color: white; }

        .plus-one { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); color: var(--wordle-green); font-size: 2rem; font-weight: bold; opacity: 0; pointer-events: none; z-index: 10; }
        .plus-one.show { animation: floatUp 0.8s ease-out forwards; }

        #message { height: 20px; font-weight: bold; color: var(--error-color); margin-bottom: 10px; z-index: 2; flex-shrink: 0; }
        
        #skip-btn { display: none; margin-bottom: 10px; padding: 8px 20px; background-color: var(--panel-bg); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; font-weight: bold; flex-shrink: 0; }
        #pass-btn { display: none; margin-bottom: 10px; padding: 8px 20px; background-color: var(--error-color); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; animation: fadein 0.3s; flex-shrink: 0; }

        /* --- 單字歷史列表 --- */
        #word-list { width: 100%; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-right: 5px; z-index: 2; flex-grow: 1; max-height: none; margin-bottom: 10px; }
        .submitted-item { display: flex; align-items: center; gap: 15px; background-color: var(--panel-bg); padding: 10px; border-radius: 6px; animation: fadein 0.3s; flex-shrink: 0; }
        .mini-board { display: flex; gap: 3px; flex-shrink: 0; }
        .mini-tile { width: 25px; height: 25px; background-color: var(--wordle-green); color: white; display: flex; justify-content: center; align-items: center; font-size: 1rem; font-weight: bold; border-radius: 2px; }
        .definition { font-size: 1rem; color: var(--def-color); flex-grow: 1; word-break: break-word; }
        .yahoo-link { color: var(--accent-color); text-decoration: none; font-size: 0.85rem; margin-left: 5px; background: rgba(74,144,226,0.1); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
        .yahoo-link:hover { text-decoration: underline; }

        /* --- 手機虛擬鍵盤 --- */
        #keyboard { 
            width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 6px; 
            margin-top: auto; 
            /* 確認修改點 1：鍵盤底部距離為 90px，徹底防誤觸 */
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 90px); 
            z-index: 2; flex-shrink: 0; 
        }
        .kb-row { display: flex; justify-content: center; gap: 6px; }
        .kb-key {
            background-color: var(--filled-border); color: white; border: none;
            border-radius: 4px; flex: 1; max-width: 40px; font-size: 1.2rem;
            font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
            height: 50px; transition: 0.2s;
        }
        [data-theme="light"] .kb-key { background-color: #a3abb5; color: white; }
        .kb-key.wide { max-width: 65px; font-size: 1rem; }
        .kb-key:active { transform: scale(0.95); opacity: 0.8; }

        #keyboard.kb-sm .kb-key { height: 40px; font-size: 1rem; }
        #keyboard.kb-md .kb-key { height: 50px; font-size: 1.2rem; }
        #keyboard.kb-lg .kb-key { height: 60px; font-size: 1.4rem; }

        #big-countdown { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 20rem; font-weight: bold; color: var(--error-color); opacity: 0; pointer-events: none; z-index: 999; }
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--overlay-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; opacity: 0; pointer-events: none; transition: 0.3s; }
        .overlay.show { opacity: 1; pointer-events: auto; }
        .overlay h2 { font-size: 3rem; margin-bottom: 10px; color: var(--text-color); text-align: center; }
        .overlay p { font-size: 1.5rem; margin-bottom: 30px; color: var(--text-color); }
        .btn-group { display: flex; gap: 20px; }
        .btn-group button { font-size: 1.2rem; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes fadein { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -40px); } }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-5px); } 40%, 80% { transform: translateX(5px); } }
        .pulse { animation: pulseAnim 1s ease-out; }
        @keyframes pulseAnim { 0% { opacity: 0.8; transform: translate(-50%, -50%) scale(0.5); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); } }
    </style>
</head>
<body>

    <header>
        <h1 onclick="quitToHome()" title="回首頁">SPEEDLE</h1>
        <div class="header-controls">
            <button id="hint-zh-btn" class="icon-btn" title="中文提示" style="display: none;">📖</button>
            <button id="hint-btn" class="icon-btn" title="給個提示" style="display: none;">💡</button>
            <button id="restart-btn" class="icon-btn" title="重新開始" style="display: none;">🔄</button>
            <button id="pause-btn" class="icon-btn" title="暫停" style="display: none;">⏸️</button>
            <button id="mute-btn" class="icon-btn" title="切換音效">🔊</button>
            <button id="theme-btn" class="icon-btn" title="切換深淺色">🌓</button>
            <button id="settings-btn" class="icon-btn" title="設定">⚙️</button>
        </div>
    </header>
    
    <div id="big-countdown">3</div>

    <div id="setup-screen" class="screen active">
        <div id="loading-msg" class="loading-text">載入字典中，請稍候...</div>
        
        <div id="mode-cards" class="mode-cards">
            <button class="mode-card card-level" onclick="startGame('level')">
                <h2>🏆 關卡模式</h2>
                <p>每關需找出 3 個單字，時間遞減</p>
                <div class="high-score-badge">最高紀錄: <span id="hs-level">0</span></div>
            </button>
            <button class="mode-card card-endless" onclick="startGame('endless')">
                <h2>🔥 無限模式</h2>
                <p>找出所有組合！答對加時</p>
                <div class="high-score-badge">最高紀錄: <span id="hs-endless">0</span></div>
            </button>
            <button class="mode-card card-practice" onclick="startGame('practice')">
                <h2>🧘 練習模式</h2>
                <p>無時間限制，輕鬆突破題庫</p>
            </button>
        </div>
    </div>

    <div id="settings-modal">
        <div class="settings-box">
            <h2>遊戲設定</h2>
            
            <label style="display:block; text-align:left; margin-bottom:10px; font-weight:bold;">單字長度:</label>
            <div class="length-selector">
                <button class="len-btn" data-len="3">3</button>
                <button class="len-btn active" data-len="4">4</button>
                <button class="len-btn" data-len="5">5</button>
                <button class="len-btn" data-len="6">6</button>
            </div>

            <label style="display:block; text-align:left; margin-bottom:10px; font-weight:bold;">點亮要固定的字母位置:</label>
            <div id="pattern-selector" class="pattern-selector"></div>

            <label style="display:block; text-align:left; margin-bottom:10px; font-weight:bold;">初始時間 (秒):</label>
            <div class="length-selector">
                <button class="time-btn" data-time="30">30</button>
                <button class="time-btn active" data-time="60">60</button>
                <button class="time-btn" data-time="90">90</button>
            </div>

            <label style="display:block; text-align:left; margin-bottom:10px; font-weight:bold;">鍵盤大小:</label>
            <div class="length-selector" id="kb-size-selector">
                <button class="kb-size-btn" data-size="kb-sm">小</button>
                <button class="kb-size-btn active" data-size="kb-md">中</button>
                <button class="kb-size-btn" data-size="kb-lg">大</button>
            </div>

            <button class="close-btn" onclick="document.getElementById('settings-modal').classList.remove('show')">完成</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-info">
            <div id="mode-display" class="mode-badge">🏆 關卡 1</div>
            <div class="stats-group">
                <div class="pill score-pill">⭐ <span id="score">0</span></div>
                <div class="pill time-pill" id="time-container">⏳ <span id="time">--</span></div>
            </div>
        </div>

        <button id="skip-btn" onclick="forceNextPuzzle()">⏭️ 換個題目</button>
        <button id="pass-btn" onclick="usePass()">⏭️ Pass (扣 1 分)</button>

        <div id="board-container">
            <div class="plus-one" id="plus-one">+1</div>
            <div id="board"></div>
        </div>

        <div id="message"></div>
        <div id="word-list"></div>

        <div id="keyboard" class="kb-md">
            <div class="kb-row">
                <button class="kb-key">Q</button><button class="kb-key">W</button><button class="kb-key">E</button><button class="kb-key">R</button><button class="kb-key">T</button><button class="kb-key">Y</button><button class="kb-key">U</button><button class="kb-key">I</button><button class="kb-key">O</button><button class="kb-key">P</button>
            </div>
            <div class="kb-row">
                <button class="kb-key">A</button><button class="kb-key">S</button><button class="kb-key">D</button><button class="kb-key">F</button><button class="kb-key">G</button><button class="kb-key">H</button><button class="kb-key">J</button><button class="kb-key">K</button><button class="kb-key">L</button>
            </div>
            <div class="kb-row">
                <button class="kb-key wide">ENTER</button>
                <button class="kb-key">Z</button><button class="kb-key">X</button><button class="kb-key">C</button><button class="kb-key">V</button><button class="kb-key">B</button><button class="kb-key">N</button><button class="kb-key">M</button>
                <button class="kb-key wide">⌫</button>
            </div>
        </div>
    </div>

    <div id="pause-overlay" class="overlay">
        <h2>遊戲暫停 ⏸️</h2>
        <button onclick="togglePause()" style="font-size: 1.2rem; padding: 10px 30px; cursor: pointer;">繼續遊戲</button>
    </div>

    <div id="game-over" class="overlay">
        <h2 id="end-title">時間到！</h2>
        <p>最終得分: <span id="final-score" style="color:var(--wordle-green); font-weight:bold;">0</span></p>
        <div class="btn-group">
            <button onclick="startGame(gameMode)" style="background-color: var(--wordle-green); color: white;">再來一局</button>
            <button onclick="reviewBoard()" style="background-color: var(--accent-color); color: white;">回顧盤面</button>
            <button onclick="quitToHome()" style="background-color: var(--panel-bg); color: var(--text-color); border:1px solid var(--border-color);">回首頁</button>
        </div>
    </div>

    <script>
        const TRANSLATION_OVERRIDES = {
            "WOKE": "覺醒的; 醒來(wake過去式)",
        };

        let cloudDict = { 3: [], 4: [], 5: [], 6: [] }; 
        let wordSet = new Set(); 
        
        let gameMode = 'level', targetLength = 4, baseTime = 60;
        let fixPattern = [true, false, false, true]; // 全新的圖形化位置記錄陣列
        
        let gameTime = 60, timeLeft = 0, score = 0, level = 1, wordsInCurrentLevel = 0;
        let puzzlePattern = []; 
        let userInput = ""; 
        let submittedWords = new Set();
        let wrongAttempts = 0;
        let isGameOver = false, isPaused = false, isAnimating = false, timerInterval, idleTimer;
        let isMuted = false, audioCtx;
        
        let currentHintWord = null;
        let revealedHints = {};
        let lastPair = ""; 

        let highScores = JSON.parse(localStorage.getItem('speedle_hs_v2'));
        if (!highScores) {
            highScores = {
                level: { 3: 0, 4: 0, 5: 0, 6: 0 },
                endless: { 3: 0, 4: 0, 5: 0, 6: 0 }
            };
        }

        async function fetchDictionary() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/first20hours/google-10000-english/master/google-10000-english-no-swears.txt');
                const text = await res.text();
                const rawWords = text.split('\n').map(w => w.trim().toUpperCase());
                
                rawWords.forEach(word => {
                    if (word.length >= 3 && word.length <= 6) { 
                        if (!/[AEIOUY]/.test(word)) return;
                        cloudDict[word.length].push(word); 
                        wordSet.add(word); 
                    }
                });

                document.getElementById('loading-msg').style.display = 'none';
                updateHighScoresUI();
                renderPatternSelector(); // 初始化畫出格子
                document.getElementById('mode-cards').classList.add('ready');
            } catch (error) { document.getElementById('loading-msg').textContent = "字典載入失敗，請重整"; }
        }
        window.onload = fetchDictionary;

        function updateHighScoresUI() {
            document.getElementById('hs-level').textContent = highScores.level[targetLength];
            document.getElementById('hs-endless').textContent = highScores.endless[targetLength];
        }

        function saveHighScore() {
            if (gameMode === 'level' && score > highScores.level[targetLength]) highScores.level[targetLength] = score;
            if (gameMode === 'endless' && score > highScores.endless[targetLength]) highScores.endless[targetLength] = score;
            localStorage.setItem('speedle_hs_v2', JSON.stringify(highScores));
            updateHighScoresUI();
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playBeep(freq = 800, type = 'sine', duration = 0.1) {
            if (isMuted || !audioCtx) return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function resetIdleTimer() {
            clearTimeout(idleTimer);
            document.getElementById('pass-btn').style.display = 'none';
            if (gameMode !== 'practice' && !isGameOver && !isPaused) {
                idleTimer = setTimeout(() => {
                    document.getElementById('pass-btn').style.display = 'block';
                }, 10000); 
            }
        }

        function usePass() {
            score--;
            wrongAttempts = 0;
            document.getElementById('score').textContent = score;
            showMessage("使用 Pass！扣 1 分");
            document.getElementById('pass-btn').style.display = 'none';
            forceNextPuzzle();
        }

        // 修改點 2：渲染圖形化的點亮格子
        function renderPatternSelector() {
            const container = document.getElementById('pattern-selector');
            container.innerHTML = '';
            for (let i = 0; i < targetLength; i++) {
                const box = document.createElement('div');
                box.className = 'pattern-box' + (fixPattern[i] ? ' active' : '');
                box.addEventListener('click', () => {
                    let newPattern = [...fixPattern];
                    newPattern[i] = !newPattern[i];
                    let fixedCount = newPattern.filter(x => x).length;
                    
                    // 防呆：強制至少要亮1格，且至少要留1個暗格給玩家打字
                    if (fixedCount > 0 && fixedCount < targetLength) {
                        fixPattern[i] = !fixPattern[i];
                        renderPatternSelector();
                    }
                });
                container.appendChild(box);
            }
        }

        document.querySelectorAll('.len-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.len-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                targetLength = parseInt(e.target.getAttribute('data-len'));
                
                // 動態產生對應長度的格子，3字模式預設只亮第1格
                fixPattern = new Array(targetLength).fill(false);
                fixPattern[0] = true;
                if (targetLength > 3) fixPattern[targetLength - 1] = true; 
                
                renderPatternSelector();
                updateHighScoresUI(); 
            });
        });

        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                baseTime = parseInt(e.target.getAttribute('data-time'));
            });
        });

        document.querySelectorAll('.kb-size-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.kb-size-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                const size = e.target.getAttribute('data-size');
                document.getElementById('keyboard').className = size;
            });
        });

        document.getElementById('theme-btn').addEventListener('click', () => { document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); });
        document.getElementById('mute-btn').addEventListener('click', (e) => { isMuted = !isMuted; e.target.textContent = isMuted ? '🔇' : '🔊'; });
        document.getElementById('settings-btn').addEventListener('click', () => { document.getElementById('settings-modal').classList.add('show'); });
        document.getElementById('pause-btn').addEventListener('click', togglePause);
        document.getElementById('restart-btn').addEventListener('click', () => { startGame(gameMode); });
        
        document.addEventListener('keydown', handleInput);

        document.querySelectorAll('.kb-key').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let keyText = e.target.textContent;
                if (keyText === 'ENTER') { handleInput({ key: 'Enter' }); } 
                else if (keyText === '⌫') { handleInput({ key: 'Backspace' }); } 
                else { handleInput({ key: keyText }); }
            });
        });

        function quitToHome() {
            clearInterval(timerInterval); clearTimeout(idleTimer); isGameOver = true;
            document.getElementById('setup-screen').classList.add('active');
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('game-over').classList.remove('show');
            document.getElementById('pause-overlay').classList.remove('show');
            
            document.getElementById('settings-btn').style.display = 'inline-block';
            document.getElementById('hint-btn').style.display = 'none';
            document.getElementById('hint-zh-btn').style.display = 'none';
            document.getElementById('pause-btn').style.display = 'none';
            document.getElementById('restart-btn').style.display = 'none'; 

            document.getElementById('keyboard').style.display = 'flex';
            document.getElementById('skip-btn').textContent = "⏭️ 換個題目";
            document.getElementById('skip-btn').onclick = forceNextPuzzle;

            updateHighScoresUI();
        }

        function togglePause() {
            if (isGameOver || gameMode === 'practice') return;
            isPaused = !isPaused; document.getElementById('pause-overlay').classList.toggle('show', isPaused);
            if (isPaused) clearTimeout(idleTimer); else resetIdleTimer();
        }

        function generatePuzzle() {
            document.getElementById('plus-one').classList.remove('show');

            const words = cloudDict[targetLength];
            let map = {};
            
            // 根據玩家點亮的圖形格子去抓取對應位置的字母當作 key
            words.forEach(w => {
                let key = "";
                for(let i=0; i<targetLength; i++) {
                    if(fixPattern[i]) key += w[i];
                }
                if (!map[key]) map[key] = [];
                map[key].push(w);
            });

            let blanksCount = fixPattern.filter(p => !p).length;
            let minRequired = blanksCount === 1 ? 3 : 5; 
            
            let validKeys = Object.keys(map).filter(k => map[k].length >= minRequired && k !== lastPair);
            if (validKeys.length === 0) validKeys = Object.keys(map).filter(k => k !== lastPair);
            if (validKeys.length === 0) validKeys = Object.keys(map);
            
            let randomKey = validKeys[Math.floor(Math.random() * validKeys.length)];
            lastPair = randomKey;
            
            // 把抽到的字母填入陣列對應發亮的格子中
            puzzlePattern = new Array(targetLength).fill(null);
            let kIdx = 0;
            for(let i=0; i<targetLength; i++) {
                if(fixPattern[i]) {
                    puzzlePattern[i] = randomKey[kIdx];
                    kIdx++;
                }
            }
            
            userInput = ""; 
            submittedWords.clear();
            currentHintWord = null; revealedHints = {};
            wrongAttempts = 0;
            
            document.getElementById('message').textContent = ""; 
            document.getElementById('hint-btn').style.display = 'inline-block';
            resetIdleTimer();
        }

        function forceNextPuzzle() {
            document.getElementById('board').style.opacity = 0; 
            setTimeout(() => { generatePuzzle(); createBoard(); document.getElementById('board').style.opacity = 1; }, 300);
        }

        function createBoard() {
            const boardEl = document.getElementById('board'); boardEl.innerHTML = "";
            for (let i = 0; i < targetLength; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile'); tile.id = `tile-${i}`;
                if (puzzlePattern[i] !== null) { 
                    tile.textContent = puzzlePattern[i]; 
                    tile.classList.add('fixed'); 
                } 
                boardEl.appendChild(tile);
            }
        }

        function startGame(mode) {
            initAudio(); gameMode = mode; 
            score = 0; level = 1; wordsInCurrentLevel = 0; isGameOver = false; isPaused = false;
            lastPair = "";
            
            document.getElementById('score').textContent = score;
            document.getElementById('word-list').innerHTML = ""; 
            document.getElementById('message').textContent = "";
            document.getElementById('pause-overlay').classList.remove('show');
            document.getElementById('game-over').classList.remove('show');

            document.getElementById('settings-btn').style.display = 'none';
            document.getElementById('hint-btn').style.display = 'inline-block';
            document.getElementById('hint-zh-btn').style.display = 'inline-block'; 
            document.getElementById('restart-btn').style.display = 'inline-block'; 
            document.getElementById('pause-btn').style.display = mode === 'practice' ? 'none' : 'inline-block';
            
            document.getElementById('keyboard').style.display = 'flex';
            document.getElementById('skip-btn').textContent = "⏭️ 換個題目";
            document.getElementById('skip-btn').onclick = forceNextPuzzle;

            const timeContainer = document.getElementById('time-container');

            if (gameMode === 'level') {
                timeLeft = baseTime; 
                document.getElementById('mode-display').textContent = `🏆 關卡 1`; 
                document.getElementById('skip-btn').style.display = 'none'; timeContainer.style.display = 'flex';
            } else if (gameMode === 'endless') {
                timeLeft = baseTime; 
                document.getElementById('mode-display').textContent = `🔥 無限模式`; 
                document.getElementById('skip-btn').style.display = 'none'; timeContainer.style.display = 'flex';
            } else {
                timeLeft = "∞"; document.getElementById('mode-display').textContent = `🧘 練習模式`; 
                document.getElementById('skip-btn').style.display = 'block'; timeContainer.style.display = 'none';
            }

            document.getElementById('time').textContent = timeLeft;
            generatePuzzle(); createBoard();

            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');

            clearInterval(timerInterval);
            if (gameMode !== 'practice') {
                timerInterval = setInterval(() => {
                    if (isPaused) return;
                    timeLeft--; document.getElementById('time').textContent = timeLeft;
                    if (timeLeft <= 3 && timeLeft > 0) {
                        playBeep(600, 'square', 0.1);
                        const bigNum = document.getElementById('big-countdown');
                        bigNum.textContent = timeLeft; bigNum.classList.remove('pulse');
                        void bigNum.offsetWidth; bigNum.classList.add('pulse');
                    }
                    if (timeLeft <= 0) endGame();
                }, 1000);
            }
        }

        document.getElementById('hint-zh-btn').addEventListener('click', async () => {
            if (isGameOver || isPaused || isAnimating) return;

            let possibleWords = cloudDict[targetLength].filter(w => {
                for(let i=0; i<targetLength; i++) {
                    if(puzzlePattern[i] !== null && w[i] !== puzzlePattern[i]) return false;
                }
                return !submittedWords.has(w);
            });
            if (possibleWords.length === 0) { showMessage("這題已經沒有單字可以提示了！"); return; }

            if (!currentHintWord || submittedWords.has(currentHintWord)) {
                currentHintWord = possibleWords[Math.floor(Math.random() * possibleWords.length)];
                revealedHints = {}; updateBoard();
            }

            showMessage("查詢中文提示中...");
            let wordToTranslate = currentHintWord;
            
            if (TRANSLATION_OVERRIDES[wordToTranslate]) {
                showMessage(`中文提示: ${TRANSLATION_OVERRIDES[wordToTranslate]}`);
            } else {
                try {
                    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${wordToTranslate}`);
                    const data = await res.json(); 
                    if (currentHintWord === wordToTranslate) {
                        showMessage(`中文提示: ${data[0][0][0]}`);
                    }
                } catch { 
                    showMessage("中文提示查詢失敗，請重試"); 
                }
            }
            playBeep(1000, 'triangle', 0.1);
        });

        document.getElementById('hint-btn').addEventListener('click', () => {
            if (isGameOver || isPaused || isAnimating) return;

            let possibleWords = cloudDict[targetLength].filter(w => {
                for(let i=0; i<targetLength; i++) {
                    if(puzzlePattern[i] !== null && w[i] !== puzzlePattern[i]) return false;
                }
                return !submittedWords.has(w);
            });
            if (possibleWords.length === 0) {
                showMessage("這題已經沒有單字可以提示了！"); return;
            }

            if (!currentHintWord || submittedWords.has(currentHintWord)) {
                currentHintWord = possibleWords[Math.floor(Math.random() * possibleWords.length)];
                revealedHints = {}; 
            }

            let unrevealed = [];
            for (let i = 0; i < targetLength; i++) {
                if (puzzlePattern[i] === null && !revealedHints[i]) unrevealed.push(i);
            }
            
            if (unrevealed.length === 0) {
                showMessage("字母提示已全開！請輸入並送出");
                document.getElementById('hint-btn').style.display = 'none';
                return;
            }

            let pick = unrevealed[Math.floor(Math.random() * unrevealed.length)];
            revealedHints[pick] = currentHintWord[pick];
            
            if (unrevealed.length === 1) {
                document.getElementById('hint-btn').style.display = 'none';
            }

            updateBoard();
            playBeep(1000, 'triangle', 0.1);
        });

        async function handleInput(e) {
            if (isGameOver || isPaused || isAnimating || !document.getElementById('game-screen').classList.contains('active')) return;
            resetIdleTimer(); 
            
            let blanksCount = puzzlePattern.filter(p => p === null).length;
            
            if (e.key === 'Backspace') {
                userInput = userInput.slice(0, -1); updateBoard();
            } else if (e.key === 'Enter') {
                await checkWord();
            } else if (/^[a-zA-Z]$/.test(e.key) && userInput.length < blanksCount) {
                userInput += e.key.toUpperCase(); updateBoard();
            }
        }

        function updateBoard() {
            let uIdx = 0;
            for (let i = 0; i < targetLength; i++) {
                const tile = document.getElementById(`tile-${i}`);
                tile.className = 'tile'; 
                
                if (puzzlePattern[i] !== null) {
                    tile.textContent = puzzlePattern[i];
                    tile.classList.add('fixed');
                } else {
                    if (uIdx < userInput.length) {
                        tile.textContent = userInput[uIdx]; 
                        tile.classList.add('filled');
                    } else if (revealedHints[i]) {
                        tile.textContent = revealedHints[i];
                        tile.classList.add('hinted');
                    } else {
                        tile.textContent = '';
                    }
                    uIdx++;
                }
            }
        }

        function shakeError() {
            playBeep(200, 'sawtooth', 0.15);
            const b = document.getElementById('board'); 
            b.classList.remove('shake'); void b.offsetWidth; b.classList.add('shake');
            for (let i = 0; i < targetLength; i++) {
                if (puzzlePattern[i] === null) document.getElementById(`tile-${i}`).classList.add('error');
            }
            
            wrongAttempts++;
            if (wrongAttempts >= 3 && gameMode !== 'practice') {
                document.getElementById('pass-btn').style.display = 'block';
            }

            setTimeout(() => {
                for (let i = 0; i < targetLength; i++) {
                    if (puzzlePattern[i] === null) document.getElementById(`tile-${i}`).classList.remove('error');
                }
            }, 400);
        }

        async function checkWord() {
            let blanksCount = puzzlePattern.filter(p => p === null).length;
            if (userInput.length !== blanksCount) { showMessage("字數不足！"); shakeError(); return; }
            
            let fullWord = "";
            let uIdx = 0;
            for (let i = 0; i < targetLength; i++) {
                if (puzzlePattern[i] !== null) fullWord += puzzlePattern[i];
                else fullWord += userInput[uIdx++];
            }
            
            if (submittedWords.has(fullWord)) { showMessage("剛剛拼過這個字囉！"); shakeError(); return; }

            let isValid = wordSet.has(fullWord);
            if (!isValid) {
                try {
                    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${fullWord}`);
                    if(res.ok) { isValid = true; wordSet.add(fullWord); }
                } catch {}
            }

            if (!isValid) { showMessage("字典裡查無此字！"); shakeError(); return; }

            handleSuccess(fullWord);
        }

        function handleSuccess(word) {
            isAnimating = true; playBeep(1200, 'sine', 0.1);
            score++; document.getElementById('score').textContent = score;
            submittedWords.add(word);
            wrongAttempts = 0;
            
            const boardEl = document.getElementById('board');
            boardEl.classList.add('board-success');
            
            addWordToHistory(word);

            const plusOne = document.getElementById('plus-one');
            plusOne.classList.remove('show'); void plusOne.offsetWidth; plusOne.classList.add('show');
            
            if (word === currentHintWord) {
                currentHintWord = null;
                revealedHints = {};
                document.getElementById('hint-btn').style.display = 'inline-block';
            }

            let possibleRemaining = cloudDict[targetLength].filter(w => {
                for(let i=0; i<targetLength; i++) {
                    if(puzzlePattern[i] !== null && w[i] !== puzzlePattern[i]) return false;
                }
                return !submittedWords.has(w);
            });
            let forceNext = (possibleRemaining.length === 0);

            setTimeout(() => {
                boardEl.classList.remove('board-success');
                if (gameMode === 'endless') {
                    timeLeft += 5; document.getElementById('time').textContent = timeLeft;
                    if(forceNext) {
                        showMessage("太神啦！這題被你突破了！時間 +5 秒"); forceNextPuzzle(); 
                    } else {
                        showMessage("得分！時間 +5 秒！請繼續突破題庫");
                        userInput = ""; updateBoard(); 
                    }
                } else if (gameMode === 'level') {
                    wordsInCurrentLevel++;
                    if (wordsInCurrentLevel >= 3 || forceNext) { 
                        showMessage(`通關！進入關卡 ${level + 1}`);
                        level++; wordsInCurrentLevel = 0; timeLeft = Math.max(10, baseTime - (level * 5)); 
                        document.getElementById('mode-display').textContent = `🏆 關卡 ${level}`;
                        forceNextPuzzle();
                    } else {
                        showMessage(`得分！請繼續輸入不同單字 (${wordsInCurrentLevel}/3)`);
                        userInput = ""; updateBoard(); 
                    }
                } else {
                    if(forceNext) {
                        showMessage("太神啦！這個題目的單字全被你拼出來了！自動換題！"); forceNextPuzzle();
                    } else {
                        showMessage("得分！請繼續突破題庫");
                        userInput = ""; updateBoard(); 
                    }
                }
                isAnimating = false;
            }, 500); 
        }

        async function addWordToHistory(word, isMissed = false) {
            const list = document.getElementById('word-list');
            const itemDiv = document.createElement('div'); itemDiv.classList.add('submitted-item');
            
            if (isMissed) {
                itemDiv.style.opacity = '0.7';
                itemDiv.style.border = '1px dashed var(--wordle-yellow)';
            }
            
            const miniBoard = document.createElement('div'); miniBoard.classList.add('mini-board');
            for(let i=0; i<word.length; i++) {
                const t = document.createElement('div'); t.classList.add('mini-tile');
                t.textContent = word[i];
                if (isMissed) t.style.backgroundColor = 'var(--wordle-gray)';
                miniBoard.appendChild(t);
            }
            
            const defSpan = document.createElement('span'); defSpan.classList.add('definition'); defSpan.textContent = "翻譯中...";
            
            const yahooLink = document.createElement('a');
            yahooLink.href = `https://tw.dictionary.search.yahoo.com/search?p=${word}`;
            yahooLink.target = "_blank"; yahooLink.classList.add('yahoo-link'); yahooLink.textContent = "查字典";

            itemDiv.appendChild(miniBoard); itemDiv.appendChild(defSpan); itemDiv.appendChild(yahooLink); list.prepend(itemDiv);

            if (TRANSLATION_OVERRIDES[word]) {
                defSpan.textContent = TRANSLATION_OVERRIDES[word];
            } else {
                try {
                    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-TW&dt=t&q=${word}`);
                    const data = await res.json(); defSpan.textContent = data[0][0][0];
                } catch { defSpan.textContent = "(翻譯異常)"; }
            }
        }

        function appendMissedWords() {
            let possibleRemaining = cloudDict[targetLength].filter(w => {
                for(let i=0; i<targetLength; i++) {
                    if(puzzlePattern[i] !== null && w[i] !== puzzlePattern[i]) return false;
                }
                return !submittedWords.has(w);
            });
            if (possibleRemaining.length === 0) return;

            let shuffled = possibleRemaining.sort(() => 0.5 - Math.random());
            let missedWords = shuffled.slice(0, 3); 

            const list = document.getElementById('word-list');
            const divider = document.createElement('div');
            divider.style.textAlign = 'center';
            divider.style.color = 'var(--wordle-yellow)';
            divider.style.margin = '15px 0 5px 0';
            divider.style.fontSize = '0.9rem';
            divider.style.fontWeight = 'bold';
            divider.textContent = "--- 以下為未猜出的可能單字 ---";
            
            missedWords.reverse().forEach(word => {
                addWordToHistory(word, true);
            });
            list.prepend(divider);
        }

        function reviewBoard() {
            document.getElementById('game-over').classList.remove('show');
            document.getElementById('keyboard').style.display = 'none';
            document.getElementById('skip-btn').textContent = "結束回顧 (回首頁)";
            document.getElementById('skip-btn').style.display = 'block';
            document.getElementById('skip-btn').onclick = quitToHome;
            document.getElementById('pass-btn').style.display = 'none';
        }

        function showMessage(msg) { 
            const msgEl = document.getElementById('message'); msgEl.textContent = msg; 
            msgEl.style.color = msg.includes("得分") || msg.includes("神") || msg.includes("通關") || msg.includes("突破") ? "var(--wordle-green)" : "var(--wordle-yellow)"; 
        }

        function endGame() {
            isGameOver = true; clearInterval(timerInterval); clearTimeout(idleTimer); playBeep(300, 'sawtooth', 0.5);
            saveHighScore();
            appendMissedWords();
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-title').textContent = gameMode === 'level' ? `到達關卡 ${level}` : '時間到！';
            document.getElementById('game-over').classList.add('show');
        }
    </script>
</body>
</html>
